[PHP]

; * ERROR_LOG;
; * ERROR_REPORTING;
; * EXTENSIONS_DIR;
; * FILE_UPLOADS;
; * OPEN_BASEDIR;
; * OUTPUT_BUFFERING;
; * OUTPUT_HANDLER;
; * URL_REWRITER_HOSTS;
; * URL_REWRITER_TAGS;
